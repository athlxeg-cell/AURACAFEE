<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080F18">
  <meta name="description" content="AURA Lounge & Café — Browse our menu">
  <title>AURA — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230D1B2A'/><text x='16' y='22' font-size='16' text-anchor='middle' font-family='serif' fill='%23C9A96E'>A</text></svg>">
</head>
<body>

<!-- ── NAVBAR ── -->
<header class="navbar" id="navbar">
  <div class="nav-left">
    <button class="back-btn" id="back-btn" aria-label="Go back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="brand">
      <img class="brand-logo" src="images/logo.svg" alt="AURA" onerror="this.style.display='none'">
      <div class="brand-text">
        <span class="brand-name" id="brand-name">AURA</span>
        <span class="brand-tag"  id="brand-tag">Lounge &amp; Café</span>
      </div>
    </div>
  </div>
  <div class="nav-right">
    <a href="about.html" class="nav-link" id="about-link">About</a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ar">ع</button>
    </div>
  </div>
</header>

<!-- ══════════════════════════════════════
     VIEW 1 — SECTIONS (landing)
══════════════════════════════════════ -->
<div id="view-sections" class="view">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-glow"></div>
    <div class="hero-content">
      <!-- Full AURA LOUNGE & CAFÉ logo SVG — matches brand image exactly -->
      <div class="hero-logo-wrap" style="width:220px">
        <img src="images/logo.svg" alt="AURA Lounge &amp; Café" style="width:100%;height:auto">
      </div>
    </div>
  </div>

  <!-- Sections grid -->
  <main class="sec-grid-wrap" aria-label="Menu sections">
    <div class="sec-grid" id="sec-grid">
      <!-- shimmer placeholders -->
      <div class="cat-card-shimmer" style="height:160px;border-radius:14px;"></div>
      <div class="cat-card-shimmer" style="height:160px;border-radius:14px;"></div>
      <div class="cat-card-shimmer" style="height:160px;border-radius:14px;"></div>
    </div>
  </main>

</div>

<!-- ══════════════════════════════════════
     VIEW 2 — CATEGORIES
══════════════════════════════════════ -->
<div id="view-categories" class="view" style="display:none">

  <!-- Section header banner -->
  <div class="section-header" id="section-header">
    <div class="section-header-icon" id="section-header-icon"></div>
    <div>
      <div class="section-header-name" id="section-header-name"></div>
      <div class="section-header-desc" id="section-header-desc"></div>
    </div>
  </div>

  <!-- Category grid -->
  <main class="cat-grid-wrap" aria-label="Menu categories">
    <div class="cat-grid" id="cat-grid">
      <div class="cat-card-shimmer"></div>
      <div class="cat-card-shimmer"></div>
      <div class="cat-card-shimmer"></div>
      <div class="cat-card-shimmer"></div>
    </div>
  </main>

</div>

<!-- ══════════════════════════════════════
     VIEW 3 — ITEMS
══════════════════════════════════════ -->
<div id="view-items" class="view" style="display:none">

  <!-- Category header -->
  <div class="items-header" id="items-header">
    <div class="items-cat-img" id="items-cat-img"></div>
    <h2 class="items-cat-name" id="items-cat-name"></h2>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input id="search-input" type="search" placeholder="Search…" autocomplete="off">
  </div>

  <!-- Items grid -->
  <main class="items-wrap" aria-label="Menu items">
    <div class="items-grid" id="items-grid"></div>
  </main>

</div>

<!-- ══════════════════════════════════════
     ITEM DETAIL — bottom-sheet modal
══════════════════════════════════════ -->
<div class="detail-overlay" id="detail-overlay" role="dialog" aria-modal="true">
  <div class="detail-sheet" id="detail-sheet">
    <button class="detail-close" id="detail-close" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="detail-img-wrap" id="detail-img-wrap"></div>
    <div class="detail-body">
      <div class="detail-badges" id="detail-badges"></div>
      <h2 class="detail-name"  id="detail-name"></h2>
      <p  class="detail-desc"  id="detail-desc"></p>
      <div class="detail-price-row">
        <span class="detail-price" id="detail-price"></span>
      </div>
      <div id="detail-video" class="detail-video" style="display:none"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     FOOTER
══════════════════════════════════════ -->
<footer class="site-footer" id="site-footer">
  <div class="footer-brand" id="footer-brand">AURA</div>
  <div class="footer-contact" id="footer-contact"></div>
  <p class="footer-copy">© 2024 AURA Lounge &amp; Café</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
