<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080F18">
  <meta name="description" content="AURA Lounge & Café — Menu">
  <meta name="robots" content="index, follow">
  <title>AURA — Menu</title>

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230D1B2A'/><text x='16' y='22' font-size='16' text-anchor='middle' font-family='serif' fill='%23C9A96E'>A</text></svg>">
</head>
<body>

<!-- ======================================================
     HEADER
====================================================== -->
<header class="header" role="banner">
  <div class="brand">
    <img class="brand-logo" src="images/logo.png" alt="AURA" id="header-logo"
         onerror="this.style.display='none'">
    <div class="brand-text">
      <div class="brand-name" id="brand-name">AURA</div>
      <div class="brand-tag"  id="brand-tag">Lounge &amp; Café</div>
    </div>
  </div>

  <div class="lang-toggle" role="group" aria-label="Language">
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="ar">ع</button>
  </div>
</header>

<!-- ======================================================
     HERO
====================================================== -->
<section class="hero" aria-label="Restaurant header">
  <div class="hero-inner">
    <div class="hero-logo-wrap">
      <img src="images/logo.png" alt="AURA Logo" id="hero-logo"
           onerror="this.style.display='none';document.getElementById('hero-logo-svg').style.display='block'">
      <svg id="hero-logo-svg" class="hero-logo-svg" style="display:none" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" fill="none" stroke="#C9A96E" stroke-width="1" opacity=".5"/>
        <text x="32" y="42" font-family="Playfair Display,serif" font-size="26" font-weight="700"
              fill="#C9A96E" text-anchor="middle">A</text>
      </svg>
    </div>
    <h1 class="hero-title" id="hero-title">AURA</h1>
    <p  class="hero-sub"   id="hero-sub">Lounge &amp; Café</p>
    <div class="hero-rule">
      <span></span><i>✦</i><span></span>
    </div>
  </div>
</section>

<!-- ======================================================
     SEARCH
====================================================== -->
<div class="search-bar" role="search">
  <span class="search-icon" aria-hidden="true">🔍</span>
  <input id="search-input" type="search" placeholder="Search menu…"
         aria-label="Search menu items" autocomplete="off" spellcheck="false">
</div>

<!-- ======================================================
     CATEGORY TABS
====================================================== -->
<nav class="cat-tabs-wrap" aria-label="Menu categories">
  <div class="cat-tabs" id="cat-tabs" role="tablist">
    <!-- populated by JS -->
  </div>
</nav>

<!-- ======================================================
     MENU ITEMS
====================================================== -->
<main class="menu-main" id="menu-main" role="main" aria-label="Menu">
  <!-- Loading shimmer -->
  <div id="menu-content">
    <div class="shimmer-card"></div>
    <div class="shimmer-card"></div>
    <div class="shimmer-card"></div>
    <div class="shimmer-card"></div>
  </div>
</main>

<!-- ======================================================
     FOOTER
====================================================== -->
<footer class="footer" role="contentinfo">
  <div class="footer-name" id="footer-name">AURA</div>
  <p class="footer-copy">© 2024 AURA Lounge &amp; Café</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
